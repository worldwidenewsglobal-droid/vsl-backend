<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  padding: 15px;
  width: 300px;
}

button {
  width: 100%;
  padding: 12px;
  background: linear-gradient(90deg, #00ff88, #00ccff);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-size: 13px;
}

.bar {
  height: 8px;
  background: #333;
  border-radius: 5px;
  margin-top: 10px;
}

.progress {
  height: 8px;
  background: #00ff88;
  width: 0%;
  border-radius: 5px;
}
</style>
</head>

<body>

<h3>🎥 VSL Downloader</h3>

<button id="baixar">⬇️ Baixar VSL</button>

<div id="status">Aguardando clique...</div>

<div class="bar">
  <div class="progress" id="progress"></div>
</div>

<script src="popup.js"></script>

</body>
</html>

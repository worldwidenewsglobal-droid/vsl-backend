<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  color: #fff;
  padding: 10px;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

.left {
  display: flex;
  gap: 10px;
  align-items: center;
}

.logo {
  width: 28px;
}

.title {
  font-size: 16px;
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  opacity: 0.6;
}

/* LIMPAR */
.clear {
  cursor: pointer;
  font-size: 18px;
  opacity: 0.7;
}

/* CARD */
.card {
  display: flex;
  align-items: center;
  background: #1e293b;
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 10px;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

/* THUMB */
.thumb {
  width: 50px;
  height: 50px;
  border-radius: 10px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* INFO */
.info {
  flex: 1;
  margin-left: 10px;
}

.name {
  font-size: 13px;
  margin-bottom: 4px;
}

.meta {
  display: flex;
  gap: 6px;
}

.tag {
  font-size: 10px;
  background: #334155;
  padding: 3px 6px;
  border-radius: 6px;
}

.tag.quality {
  background: #38bdf8;
  color: #000;
}

/* BOTÃO DOWNLOAD */
.download {
  background: linear-gradient(90deg,#22c55e,#16a34a);
  border: none;
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* PROGRESS */
.progress-bar {
  height: 4px;
  background: #111;
  margin-top: 6px;
  border-radius: 4px;
}

.progress {
  height: 4px;
  width: 0%;
  background: linear-gradient(#00ff88,#00ccff);
  border-radius: 4px;
}

/* EMPTY */
.empty {
  text-align: center;
  margin-top: 80px;
}

.empty h2 {
  font-size: 18px;
}

.empty p {
  font-size: 13px;
  opacity: 0.6;
}

.reload {
  margin-top: 15px;
  background: #22c55e;
  border: none;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <img src="icons/icon32.png" class="logo">
    <div>
      <div class="title">VSL Downloader</div>
      <div class="subtitle">Baixe qualquer vídeo em segundos 🚀</div>
    </div>
  </div>

  <div id="clear" class="clear">🧹</div>
</div>

<div id="list"></div>

<div id="empty" class="empty" style="display:none;">
  <div style="font-size:50px;">😴</div>
  <h2>Nenhum download encontrado</h2>
  <p>Reproduza o vídeo e tente novamente</p>
  <button class="reload" id="reload">🔄 Recarregar página</button>
</div>

<script src="sidepanel.js"></script>

</body>
</html>

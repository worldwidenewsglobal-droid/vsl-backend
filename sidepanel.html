<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: 'Segoe UI';
  background: #0b0f17;
  color: #fff;
  padding: 14px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(#00ff88,#00ccff);
  border-radius: 10px;
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
}

.logo { width: 26px; border-radius: 6px; }

.card {
  background: linear-gradient(145deg,#121826,#0e1420);
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  gap: 10px;
}

.thumb {
  width: 80px;
  height: 55px;
  object-fit: cover;
  border-radius: 6px;
}

.info { flex: 1; }

.name {
  font-size: 13px;
  margin-bottom: 4px;
}

.tag {
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 5px;
  background: #1f2a3a;
}

.quality {
  background: #00ccff;
  color: black;
  margin-left: 5px;
}

.right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

button {
  background: linear-gradient(90deg,#00ff88,#00ccff);
  border: none;
  padding: 5px 8px;
  border-radius: 6px;
  cursor: pointer;
}

.progress-bar {
  height: 4px;
  background: #1a2333;
  border-radius: 5px;
  margin-top: 5px;
}

.progress {
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg,#00ff88,#00ccff);
}
</style>
</head>

<body>

<div class="header">
  <img src="icons/icon32.png" class="logo">
  <b>VSL Downloader</b>
</div>

<div id="list"></div>

<script src="sidepanel.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: 'Segoe UI';
  background: #111827;
  color: #fff;
  padding: 12px;
}

.header {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
}

.best {
  width: 100%;
  background: #3b82f6;
  border: none;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 12px;
  cursor: pointer;
}

.card {
  display: flex;
  align-items: center;
  background: #1f2937;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 8px;
}

.thumb {
  width: 45px;
  height: 45px;
  border-radius: 8px;
}

.info {
  flex: 1;
  margin-left: 10px;
}

.name {
  font-size: 13px;
}

.meta {
  font-size: 11px;
  opacity: 0.6;
}

button {
  background: #22c55e;
  border: none;
  padding: 8px 10px;
  border-radius: 20px;
  cursor: pointer;
}

.progress-bar {
  height: 4px;
  background: #1a2333;
  margin-top: 6px;
}

.progress {
  height: 4px;
  width: 0%;
  background: linear-gradient(#00ff88,#00ccff);
}
</style>
</head>

<body>

<div class="header">🎥 VSL Downloader</div>

<button id="best" class="best">⬇️ Baixar Melhor Qualidade</button>

<div id="list"></div>

<script src="sidepanel.js"></script>

</body>
</html>

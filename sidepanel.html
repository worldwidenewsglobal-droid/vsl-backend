<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0b0f17;
  color: #fff;
  padding: 16px;
}

/* SCROLL PREMIUM */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(#00ff88,#00ccff);
  border-radius: 10px;
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
}

.logo { width: 26px; border-radius: 6px; }

.title { font-size: 18px; font-weight: bold; }

#list { max-height: 80vh; overflow-y: auto; }

.card {
  background: linear-gradient(145deg,#121826,#0e1420);
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 12px;
}

.thumb {
  width: 100%;
  height: 120px;
  border-radius: 8px;
  margin-bottom: 8px;
  object-fit: cover;
}

.tag {
  font-size: 11px;
  padding: 3px 7px;
  border-radius: 6px;
  margin-right: 6px;
  background: #1f2a3a;
}

.quality {
  background: #00ccff;
  color: black;
}

button {
  background: linear-gradient(90deg,#00ff88,#00ccff);
  border: none;
  padding: 7px 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 6px;
}

.progress-bar {
  height: 6px;
  background: #1a2333;
  border-radius: 6px;
  margin-top: 8px;
}

.progress {
  height: 6px;
  width: 0%;
  background: linear-gradient(90deg,#00ff88,#00ccff);
  border-radius: 6px;
}

.empty {
  text-align: center;
  opacity: 0.5;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="header">
  <img src="icons/icon32.png" class="logo">
  <div class="title">VSL Downloader</div>
</div>

<div id="list"></div>
<div id="empty" class="empty">Nenhum vídeo detectado</div>

<script src="sidepanel.js"></script>

</body>
</html>

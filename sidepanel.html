<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: 'Segoe UI';
  background: #0b0f17;
  color: #fff;
  padding: 14px;
}

.card {
  background: #121826;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
  display: flex;
  gap: 10px;
}

.thumb {
  width: 80px;
  height: 55px;
  border-radius: 6px;
}

.info { flex: 1; }

.tag {
  font-size: 10px;
  background: #1f2a3a;
  padding: 3px 6px;
  border-radius: 5px;
}

.quality {
  background: #00ccff;
  color: black;
}

button {
  background: linear-gradient(90deg,#00ff88,#00ccff);
  border: none;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
}

.progress-bar {
  height: 4px;
  background: #1a2333;
  margin-top: 5px;
}

.progress {
  height: 4px;
  width: 0%;
  background: linear-gradient(#00ff88,#00ccff);
}
</style>
</head>

<body>

<div id="list"></div>

<script src="sidepanel.js"></script>

</body>
</html>

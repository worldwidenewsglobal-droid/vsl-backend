<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0b0f17;
  color: #fff;
  padding: 14px;
}

/* SCROLL */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(#00ff88,#00ccff);
  border-radius: 10px;
}

.header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
}

.logo { width: 26px; border-radius: 6px; }
.title { font-size: 18px; font-weight: bold; }

#list {
  max-height: 80vh;
  overflow-y: auto;
}

/* CARD */
.card {
  background: linear-gradient(145deg,#121826,#0e1420);
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 12px;
  display: flex;
  gap: 10px;
  align-items: center;
}

/* THUMB */
.thumb {
  width: 90px;
  height: 60px;
  border-radius: 8px;
  object-fit: cover;
}

/* INFO */
.info {
  flex: 1;
}

.name {
  font-size: 13px;
  margin-bottom: 4px;
}

.tags {
  display: flex;
  gap: 6px;
}

.tag {
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 5px;
  background: #1f2a3a;
}

.quality {
  background: #00ccff;
  color: black;
}

/* RIGHT SIDE */
.right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
}

.format {
  font-size: 10px;
  opacity: 0.7;
}

/* BUTTON */
button {
  background: linear-gradient(90deg,#00ff88,#00ccff);
  border: none;
  padding: 6px 10px;
  border-radius: 7px;
  font-size: 11px;
  cursor: pointer;
  font-weight: bold;
}

/* PROGRESS */
.progress-bar {
  height: 4px;
  background: #1a2333;
  border-radius: 5px;
  margin-top: 5px;
}

.progress {
  height: 4px;
  width: 0%;
  background: linear-gradient(90deg,#00ff88,#00ccff);
}

.empty {
  text-align: center;
  opacity: 0.5;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="header">
  <img src="icons/icon32.png" class="logo">
  <div class="title">VSL Downloader</div>
</div>

<div id="list"></div>
<div id="empty" class="empty">Nenhum vídeo detectado</div>

<script src="sidepanel.js"></script>

</body>
</html>
